spring:
  application:
    name: restaurant
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.h2.Driver
    username: ${DATABASE_USER}
    password: ${DATABASE_PASS}
  jpa:
    show_sql: true
    hibernate:
      ddl-auto: true
  h2:
    console:
      enabled: true
      path: /h2-console